<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Country Currency Summary</title>

    <!-- Roboto font -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            color: #fff;
            font-family: 'Roboto', Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 90%;
            max-width: 700px;
            text-align: center;
            padding: 40px 30px;
            background-color: #0d0d0d;
            border: 2px solid #f5c400;
            border-radius: 16px;
            box-shadow: 0 0 20px rgba(245, 196, 0, 0.2);
        }

        h1 {
            margin-bottom: 10px;
            font-size: 2.2rem;
            font-weight: 700;
        }

        h1 span {
            color: #f5c400;
        }

        p {
            color: #ddd;
            margin-bottom: 30px;
            font-size: 1rem;
        }

        .input-group {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 25px;
        }

        input {
            padding: 12px 15px;
            width: 260px;
            border: 1px solid #f5c400;
            border-radius: 8px;
            background-color: #111;
            color: white;
            font-size: 1rem;
            outline: none;
        }

        input::placeholder {
            color: #aaa;
        }

        button {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            background-color: #f5c400;
            color: black;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s ease;
        }

        button:hover {
            background-color: #ffd633;
            transform: translateY(-1px);
        }

        pre {
            text-align: left;
            background-color: #111;
            color: #fff;
            padding: 20px;
            border-radius: 10px;
            border: 1px solid #333;
            overflow-x: auto;
            white-space: pre-wrap;
            word-wrap: break-word;
            font-size: 0.95rem;
        }

        .footer-note {
            margin-top: 18px;
            font-size: 0.9rem;
            color: #999;
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 1.7rem;
            }

            input {
                width: 100%;
            }

            .input-group {
                flex-direction: column;
                align-items: stretch;
            }

            button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Country <span>Currency Summary</span></h1>
        <p>Enter a country name to view its capital, region, currency, and USD exchange rate.</p>

        <div class="input-group">
            <input type="text" id="countryInput" placeholder="e.g. Japan">
            <button onclick="getSummary()">Get Summary</button>
        </div>

        <pre id="result">Your result will appear here...</pre>

        <div class="footer-note">
            Powered by your Django API
        </div>
    </div>

    <script>
        async function getSummary() {
            const country = document.getElementById('countryInput').value.trim();
            const resultBox = document.getElementById('result');

            if (!country) {
                resultBox.textContent = "Please enter a country name.";
                return;
            }

            resultBox.textContent = "Loading...";

            try {
                const response = await fetch(`/api/v1/country-currency-summary/?country=${encodeURIComponent(country)}`);
                const data = await response.json();

                resultBox.textContent = JSON.stringify(data, null, 2);
            } catch (error) {
                resultBox.textContent = "Something went wrong while fetching data.";
            }
        }
    </script>
</body>
</html>
